<text x="490" y="244" font-size="10" fill="#ef4444">Tidak</text>

<!-- Ya ↓ -->
<text x="358" y="300" font-size="11" fill="#16a34a" font-weight="600">Ya</text>
<line x1="350" y1="282" x2="350" y2="308" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>


