<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 700 980" width="700" height="980" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; }</style>
  <filter id="sh" x="-8%" y="-8%" width="120%" height="120%">
