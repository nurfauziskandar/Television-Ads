  <marker id="a"  viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/>
  </marker>
</defs>

<!-- Latar belakang -->
<rect width="700" height="920" fill="#ffffff"/>
<rect x="1" y="1" width="698" height="918" rx="6" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

