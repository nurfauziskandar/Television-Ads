<text x="435" y="65" font-size="10" fill="#64748b">Input / Output</text>
<rect x="546" y="57" width="50" height="11" rx="0" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
<ellipse cx="571" cy="57" rx="25" ry="5" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
