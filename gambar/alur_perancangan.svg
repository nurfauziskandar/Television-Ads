<rect x="1100" y="118" width="275" height="12" fill="#122a1e"/>
<text x="1237" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#3fb950">&#128250; TV Display Client</text>

<text x="1118" y="148" font-size="10" fill="#6e7681">Akses:  /display?token=&lt;token&gt;</text>
<line x1="1116" y1="158" x2="1357" y2="158" stroke="#21262d" stroke-width="1"/>

<!-- Idle Screen -->
<text x="1118" y="178" font-size="11" font-weight="600" fill="#8b949e">Layar Idle</text>
<text x="1118" y="195" font-size="10" fill="#8b949e">&#9656;  Jam real-time &amp; tanggal (bahasa Indonesia)</text>
<text x="1118" y="211" font-size="10" fill="#8b949e">&#9656;  Status koneksi WebSocket</text>
<text x="1118" y="227" font-size="10" fill="#8b949e">&#9656;  Token badge di bawah layar</text>
<text x="1118" y="243" font-size="10" fill="#8b949e">&#9656;  Pulsing gradient background</text>

<line x1="1116" y1="254" x2="1357" y2="254" stroke="#21262d" stroke-width="1"/>

<!-- IPTV Screen -->
<text x="1118" y="274" font-size="11" font-weight="600" fill="#58a6ff">Layar IPTV</text>
<text x="1118" y="291" font-size="10" fill="#8b949e">&#9656;  HLS.js untuk stream .m3u8</text>
<text x="1118" y="307" font-size="10" fill="#8b949e">&#9656;  dash.js untuk stream .mpd</text>
<text x="1118" y="323" font-size="10" fill="#8b949e">&#9656;  Native HTML5 untuk video lokal (loop)</text>
<text x="1118" y="339" font-size="10" fill="#8b949e">&#9656;  Overlay channel (logo, nama, grup)</text>
<text x="1118" y="355" font-size="10" fill="#8b949e">&#9656;  Auto-hide overlay setelah 5 detik</text>

<line x1="1116" y1="366" x2="1357" y2="366" stroke="#21262d" stroke-width="1"/>

<!-- Ads Screen -->
<text x="1118" y="386" font-size="11" font-weight="600" fill="#f0883e">Layar Iklan</text>
<text x="1118" y="403" font-size="10" fill="#8b949e">&#9656;  Double-layer crossfade (0.8 detik)</text>
<text x="1118" y="419" font-size="10" fill="#8b949e">&#9656;  Gambar: durasi configurable per iklan</text>
<text x="1118" y="435" font-size="10" fill="#8b949e">&#9656;  Video: tunggu sampai selesai putar</text>
<text x="1118" y="451" font-size="10" fill="#8b949e">&#9656;  Progress bar di bawah layar</text>
<text x="1118" y="467" font-size="10" fill="#8b949e">&#9656;  Loop playlist secara tak terbatas</text>
<text x="1118" y="483" font-size="10" fill="#8b949e">&#9656;  Volume via WebSocket command</text>
<text x="1118" y="499" font-size="10" fill="#8b949e">&#9656;  Double-click layar = toggle fullscreen</text>
<text x="1118" y="515" font-size="10" fill="#8b949e">&#9656;  Dot indikator koneksi (merah/hijau)</text>
<text x="1118" y="531" font-size="10" fill="#8b949e">&#9656;  Reconnect otomatis jika terputus</text>


