<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1400 870" width="1400" height="870" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    text { font-family: 'Segoe UI', -apple-system, Arial, sans-serif; }
  </style>
  <marker id="a-blue" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#4c7bf5"/>
  </marker>
  <marker id="a-orange" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#f0883e"/>
  </marker>
  <marker id="a-green" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#2dd4a0"/>
  </marker>
  <marker id="a-purple" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#bc8cff"/>
  </marker>
  <marker id="a-red" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#e5534b"/>
  </marker>
</defs>

<!-- Background -->
<rect width="1400" height="870" fill="#0d1117"/>

<!-- Subtle grid dots -->
<pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
  <circle cx="20" cy="20" r="1" fill="#1c2128"/>
</pattern>
<rect width="1400" height="870" fill="url(#dots)"/>

<!-- ========== TITLE ========== -->
<text x="700" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e6edf3">Alur Perancangan — Television Ads System</text>
<text x="700" y="65" text-anchor="middle" font-size="12" fill="#6e7681">Arsitektur Sistem Manajemen Iklan &amp; IPTV Berbasis Web  •  Flask + Socket.IO + SQLite</text>


<!-- ============================================================
     ADMIN PANEL BOX  x=30 y=88 w=275 h=415
     ============================================================ -->
<!-- Shadow -->
<rect x="34" y="92" width="275" height="415" rx="12" fill="#000" opacity="0.35"/>
<!-- Body -->
<rect x="30" y="88" width="275" height="415" rx="12" fill="#161b22" stroke="#2450a4" stroke-width="1.5"/>
<!-- Header -->
<rect x="30" y="88" width="275" height="42" rx="12" fill="#1c3166"/>
<rect x="30" y="118" width="275" height="12" fill="#1c3166"/>
<text x="167" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#79b8ff">&#9881; Admin Panel</text>

<!-- Halaman section -->
<text x="50" y="150" font-size="11" font-weight="600" fill="#4c7bf5">Halaman</text>
<text x="50" y="167" font-size="10" fill="#8b949e">&#9656;  /login  &amp;  /setup</text>
<text x="50" y="183" font-size="10" fill="#8b949e">&#9656;  /admin/  —  Dashboard &amp; statistik</text>
<text x="50" y="199" font-size="10" fill="#8b949e">&#9656;  /admin/channels  —  Channel IPTV</text>
<text x="50" y="215" font-size="10" fill="#8b949e">&#9656;  /admin/ads  —  Upload iklan</text>
<text x="50" y="231" font-size="10" fill="#8b949e">&#9656;  /admin/playlists  —  Susun playlist</text>
<text x="50" y="247" font-size="10" fill="#8b949e">&#9656;  /admin/devices  —  Kelola TV &amp; token</text>
<text x="50" y="263" font-size="10" fill="#8b949e">&#9656;  /admin/control  —  Kontrol live per TV</text>

<line x1="48" y1="277" x2="287" y2="277" stroke="#21262d" stroke-width="1"/>

<!-- WebSocket Admin section -->
<text x="50" y="297" font-size="11" font-weight="600" fill="#f0883e">WebSocket  /admin</text>
<text x="50" y="315" font-size="10" fill="#8b949e">&#9656;  Terima: display_update (realtime)</text>
<text x="50" y="331" font-size="10" fill="#8b949e">&#9656;  Terima: device_status_update</text>
<text x="50" y="347" font-size="10" fill="#8b949e">&#9656;  Membutuhkan login session aktif</text>

<line x1="48" y1="361" x2="287" y2="361" stroke="#21262d" stroke-width="1"/>

<!-- Auth section -->
<text x="50" y="381" font-size="11" font-weight="600" fill="#bc8cff">Autentikasi</text>
<text x="50" y="399" font-size="10" fill="#8b949e">&#9656;  Session Flask (30 hari)</text>
<text x="50" y="415" font-size="10" fill="#8b949e">&#9656;  Werkzeug password hash</text>
<text x="50" y="431" font-size="10" fill="#8b949e">&#9656;  Token unik per perangkat TV</text>
<text x="50" y="447" font-size="10" fill="#8b949e">&#9656;  Token bisa dikustomisasi admin</text>
<text x="50" y="463" font-size="10" fill="#8b949e">&#9656;  Validasi: huruf/angka/dash/underscore</text>
<text x="50" y="479" font-size="10" fill="#8b949e">&#9656;  Max 64 karakter, unik per device</text>


<!-- ============================================================
     FLASK SERVER BOX  x=480 y=88 w=440 h=525
     ============================================================ -->
<rect x="484" y="92" width="440" height="525" rx="12" fill="#000" opacity="0.35"/>
<rect x="480" y="88" width="440" height="525" rx="12" fill="#161b22" stroke="#1d3a5a" stroke-width="1.5"/>
<rect x="480" y="88" width="440" height="42" rx="12" fill="#162035"/>
<rect x="480" y="118" width="440" height="12" fill="#162035"/>
<text x="700" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#58a6ff">&#9881; Flask Server  (port 8000)</text>

<!-- REST API -->
<text x="500" y="150" font-size="11" font-weight="600" fill="#2dd4a0">REST API  (login required)</text>
<text x="500" y="167" font-size="10" fill="#8b949e">&#9656;  GET/POST  /api/channels  +  /upload  +  /import</text>
<text x="500" y="183" font-size="10" fill="#8b949e">&#9656;  GET/POST/PUT/DELETE  /api/ads</text>
<text x="500" y="199" font-size="10" fill="#8b949e">&#9656;  GET/POST/PUT/DELETE  /api/playlists  +  /items  +  /reorder</text>
<text x="500" y="215" font-size="10" fill="#8b949e">&#9656;  GET/POST/PUT/DELETE  /api/devices</text>
<text x="500" y="231" font-size="10" fill="#8b949e">&#9656;  POST  /api/devices/{id}/token  (acak atau kustom)</text>
<text x="500" y="247" font-size="10" fill="#8b949e">&#9656;  POST  /api/display/command  (play_channel / play_ads / idle / volume)</text>
<text x="500" y="263" font-size="10" fill="#8b949e">&#9656;  GET  /api/display/status  —  daftar display online</text>

<line x1="498" y1="275" x2="902" y2="275" stroke="#21262d" stroke-width="1"/>

<!-- WebSocket -->
<text x="500" y="295" font-size="11" font-weight="600" fill="#f0883e">WebSocket  —  Socket.IO</text>
<text x="500" y="313" font-size="10" fill="#8b949e">&#9656;  Namespace /display  —  event: register, status  (token auth)</text>
<text x="500" y="329" font-size="10" fill="#8b949e">&#9656;  Namespace /admin  —  event: display_update, device_status_update</text>
<text x="500" y="345" font-size="10" fill="#8b949e">&#9656;  Room per device: "device_&lt;token&gt;"  untuk targeting spesifik</text>
<text x="500" y="361" font-size="10" fill="#8b949e">&#9656;  Reconnect otomatis + exponential backoff di sisi display</text>

<line x1="498" y1="373" x2="902" y2="373" stroke="#21262d" stroke-width="1"/>

<!-- Stream Proxy -->
<text x="500" y="393" font-size="11" font-weight="600" fill="#e5534b">Stream Proxy  (CORS bypass)</text>
<text x="500" y="411" font-size="10" fill="#8b949e">&#9656;  GET /api/proxy/stream?url=...  —  proxy M3U8 &amp; segmen</text>
<text x="500" y="427" font-size="10" fill="#8b949e">&#9656;  Rewrite URL di manifest agar setiap segmen melewati proxy</text>
<text x="500" y="443" font-size="10" fill="#8b949e">&#9656;  DASH .mpd diakses langsung tanpa proxy</text>

<line x1="498" y1="455" x2="902" y2="455" stroke="#21262d" stroke-width="1"/>

<!-- Models -->
<text x="500" y="475" font-size="11" font-weight="600" fill="#bc8cff">Model  —  SQLAlchemy ORM</text>
<text x="500" y="493" font-size="10" fill="#8b949e">AdminUser  •  Channel  •  Ad  •  Playlist  •  PlaylistItem</text>
<text x="500" y="509" font-size="10" fill="#8b949e">Device  •  DeviceChannel  •  DevicePlaylist</text>

<line x1="498" y1="521" x2="902" y2="521" stroke="#21262d" stroke-width="1"/>

<!-- Config/Stack -->
<text x="500" y="541" font-size="11" font-weight="600" fill="#6e7681">Stack &amp; Konfigurasi</text>
<text x="500" y="557" font-size="10" fill="#8b949e">Flask • Flask-SQLAlchemy • Flask-SocketIO • Werkzeug • requests</text>
<text x="500" y="573" font-size="10" fill="#8b949e">SQLite  •  CORS allow all  •  Max upload 500MB  •  Threading mode</text>
<text x="500" y="589" font-size="10" fill="#8b949e">.secret_key persistent  •  Port 8000  •  Session 30 hari</text>


<!-- ============================================================
     TV DISPLAY BOX  x=1100 y=88 w=275 h=470
     ============================================================ -->
<rect x="1104" y="92" width="275" height="470" rx="12" fill="#000" opacity="0.35"/>
<rect x="1100" y="88" width="275" height="470" rx="12" fill="#161b22" stroke="#1a4a35" stroke-width="1.5"/>
