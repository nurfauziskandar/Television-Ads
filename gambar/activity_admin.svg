<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 760 1180" width="760" height="1180" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; }</style>
  <filter id="sh" x="-8%" y="-8%" width="120%" height="120%">
    <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#0000001a"/>
  </filter>
  <marker id="a"  viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="7" markerHeight="5" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/>
  </marker>
</defs>

<rect width="760" height="1180" fill="#ffffff"/>
<rect x="1" y="1" width="758" height="1178" rx="6" fill="none" stroke="#e2e8f0" stroke-width="1.5"/>

<!-- Judul -->
<text x="380" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Activity Diagram — Role Admin</text>
<text x="380" y="50" text-anchor="middle" font-size="11" fill="#64748b">Television Ads — akses penuh ke semua menu pengelolaan</text>
<line x1="50" y1="62" x2="710" y2="62" stroke="#e2e8f0" stroke-width="1.5"/>

<!-- Legenda -->
<circle cx="60" cy="80" r="6" fill="#1e293b"/>
<text x="74" y="84" font-size="10" fill="#64748b">Initial / Final node</text>
<rect x="200" y="74" width="14" height="12" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
<text x="220" y="84" font-size="10" fill="#64748b">Action</text>
<polygon points="290,80 298,73 306,80 298,87" fill="none" stroke="#d97706" stroke-width="1.5"/>
<text x="312" y="84" font-size="10" fill="#64748b">Decision</text>
<rect x="390" y="76" width="40" height="8" fill="#1e293b"/>
<text x="436" y="84" font-size="10" fill="#64748b">Fork / Join</text>
<rect x="510" y="73" width="60" height="14" rx="2" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
<text x="578" y="84" font-size="10" fill="#64748b">Datastore</text>
<line x1="50" y1="98" x2="710" y2="98" stroke="#e2e8f0" stroke-width="1"/>

<!-- 1. Start -->
<circle cx="380" cy="118" r="10" fill="#1e293b"/>
<line x1="380" y1="128" x2="380" y2="148" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 2. Buka aplikasi -->
<rect x="280" y="150" width="200" height="38" rx="19" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Buka aplikasi /login</text>
<line x1="380" y1="188" x2="380" y2="208" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 3. Input kredensial -->
<rect x="280" y="210" width="200" height="38" rx="19" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Input username &amp; password</text>
<line x1="380" y1="248" x2="380" y2="268" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 4. Decision login -->
<polygon points="380,268 470,308 380,348 290,308" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="304" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Kredensial &amp;</text>
<text x="380" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">role=admin?</text>

<!-- Tidak -> error loop -->
<path d="M470,308 L600,308 L600,229 L480,229" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
<rect x="510" y="288" width="92" height="28" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="556" y="301" text-anchor="middle" font-size="10" fill="#dc2626">Tampilkan</text>
<text x="556" y="313" text-anchor="middle" font-size="10" fill="#dc2626">Pesan Error</text>
<text x="478" y="304" font-size="10" fill="#ef4444">Tidak</text>

<!-- Ya -->
<text x="388" y="364" font-size="11" fill="#16a34a" font-weight="600">Ya</text>
<line x1="380" y1="348" x2="380" y2="372" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 5. Set session admin_role=admin (datastore session) -->
<rect x="265" y="374" width="230" height="40" rx="2" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="391" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Set session admin_role = admin</text>
<text x="380" y="407" text-anchor="middle" font-size="11" fill="#4c1d95">Flask session cookie</text>
<line x1="380" y1="414" x2="380" y2="434" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 6. Tampilkan Dashboard Admin -->
<rect x="270" y="436" width="220" height="44" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="453" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Tampilkan Dashboard</text>
<text x="380" y="470" text-anchor="middle" font-size="11" fill="#1e40af">Statistik + Aksi Cepat</text>
<line x1="380" y1="480" x2="380" y2="500" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 7. Pilih menu (decision multi) -->
<polygon points="380,500 530,545 380,590 230,545" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="540" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Pilih menu</text>
<text x="380" y="556" text-anchor="middle" font-size="11" fill="#78350f">(Channel/Iklan/Playlist/</text>
<text x="380" y="570" text-anchor="middle" font-size="11" fill="#78350f">Perangkat/Kontrol/User/Setting)</text>

<!-- Fork bar untuk 7 menu -->
<line x1="380" y1="590" x2="380" y2="612" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="60" y="614" width="640" height="8" fill="#1e293b"/>

<!-- 7 cabang menu -->
<!-- Channel -->
<line x1="100" y1="622" x2="100" y2="648" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="40" y="650" width="120" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="100" y="667" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kelola Channel</text>
<text x="100" y="681" text-anchor="middle" font-size="10" fill="#1e40af">Tambah / Edit / Hapus / M3U</text>

<!-- Iklan -->
<line x1="200" y1="622" x2="200" y2="648" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="170" y="650" width="120" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="230" y="667" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kelola Iklan</text>
<text x="230" y="681" text-anchor="middle" font-size="10" fill="#1e40af">Upload / Toggle / Hapus</text>

<!-- Playlist -->
<line x1="320" y1="622" x2="320" y2="648" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="300" y="650" width="120" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="360" y="667" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kelola Playlist</text>
<text x="360" y="681" text-anchor="middle" font-size="10" fill="#1e40af">Buat / Susun item / Hapus</text>

<!-- Perangkat -->
<line x1="440" y1="622" x2="440" y2="648" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="430" y="650" width="120" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="490" y="667" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kelola Perangkat</text>
<text x="490" y="681" text-anchor="middle" font-size="10" fill="#1e40af">Daftarkan / Token / Assign</text>

<!-- Kontrol -->
<line x1="560" y1="622" x2="560" y2="648" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="560" y="650" width="120" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="620" y="667" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kontrol Display</text>
<text x="620" y="681" text-anchor="middle" font-size="10" fill="#1e40af">Push channel / playlist live</text>

<!-- User -->
<line x1="160" y1="622" x2="160" y2="710" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="100" y="712" width="140" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="170" y="729" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kelola User</text>
<text x="170" y="743" text-anchor="middle" font-size="10" fill="#1e40af">Tambah / Edit role / Hapus</text>

<!-- Setting -->
<line x1="600" y1="622" x2="600" y2="710" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>
<rect x="540" y="712" width="140" height="40" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="610" y="729" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Kelola Setting</text>
<text x="610" y="743" text-anchor="middle" font-size="10" fill="#1e40af">Warna / Idle / Logo</text>

<!-- Konvergensi ke validasi -->
<line x1="100" y1="690" x2="100" y2="780" stroke="#475569" stroke-width="1.5"/>
<line x1="230" y1="690" x2="230" y2="780" stroke="#475569" stroke-width="1.5"/>
<line x1="360" y1="690" x2="360" y2="780" stroke="#475569" stroke-width="1.5"/>
<line x1="490" y1="690" x2="490" y2="780" stroke="#475569" stroke-width="1.5"/>
<line x1="620" y1="690" x2="620" y2="780" stroke="#475569" stroke-width="1.5"/>
<line x1="170" y1="752" x2="170" y2="780" stroke="#475569" stroke-width="1.5"/>
<line x1="610" y1="752" x2="610" y2="780" stroke="#475569" stroke-width="1.5"/>

<!-- Join bar -->
<rect x="60" y="780" width="640" height="8" fill="#1e293b"/>
<line x1="380" y1="788" x2="380" y2="810" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 8. Submit -->
<rect x="270" y="812" width="220" height="38" rx="19" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="836" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Submit perubahan ke server</text>
<line x1="380" y1="850" x2="380" y2="870" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 9. Validasi server -->
<polygon points="380,870 480,910 380,950 280,910" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="906" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Validasi data &amp;</text>
<text x="380" y="922" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">@admin_required?</text>

<!-- Tidak -> error -->
<path d="M480,910 L620,910 L620,830 L500,830" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
<rect x="528" y="890" width="92" height="28" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
<text x="574" y="903" text-anchor="middle" font-size="10" fill="#dc2626">403 / Pesan</text>
<text x="574" y="915" text-anchor="middle" font-size="10" fill="#dc2626">Error</text>
<text x="488" y="906" font-size="10" fill="#ef4444">Tidak</text>

<!-- Ya -->
<text x="388" y="966" font-size="11" fill="#16a34a" font-weight="600">Ya</text>
<line x1="380" y1="950" x2="380" y2="974" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 10. Simpan DB / broadcast -->
<rect x="240" y="976" width="280" height="44" rx="2" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="993" text-anchor="middle" font-size="12" font-weight="600" fill="#4c1d95">Simpan ke tvads.db</text>
<text x="380" y="1010" text-anchor="middle" font-size="11" fill="#4c1d95">+ broadcast Socket.IO ke display</text>
<line x1="380" y1="1020" x2="380" y2="1042" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

<!-- 11. Decision lanjut -->
<polygon points="380,1042 470,1080 380,1118 290,1080" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
<text x="380" y="1078" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">Lanjut</text>
<text x="380" y="1094" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">menu lain?</text>

<!-- Ya loop ke pilih menu -->
<path d="M290,1080 L40,1080 L40,545 L230,545" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3" fill="none" marker-end="url(#ag)"/>
<text x="100" y="1075" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">Ya</text>

<!-- Tidak -> logout -->
<text x="388" y="1136" font-size="11" fill="#475569" font-weight="600">Tidak</text>
<line x1="470" y1="1080" x2="650" y2="1080" stroke="#475569" stroke-width="1.5"/>
<line x1="650" y1="1080" x2="650" y2="1140" stroke="#475569" stroke-width="1.5"/>

<!-- 12. Logout -->
<rect x="560" y="1130" width="180" height="32" rx="16" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#sh)"/>
<text x="650" y="1150" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Logout</text>

<!-- final -->
<circle cx="650" cy="1170" r="9" fill="none" stroke="#1e293b" stroke-width="2"/>
<circle cx="650" cy="1170" r="5" fill="#1e293b"/>
<line x1="650" y1="1162" x2="650" y2="1162" stroke="#475569" stroke-width="1"/>
<line x1="650" y1="1140" x2="650" y2="1160" stroke="#475569" stroke-width="1.8" marker-end="url(#a)"/>

</svg>
