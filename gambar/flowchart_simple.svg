<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 680 920" width="680" height="920" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>text { font-family: 'Segoe UI', Arial, sans-serif; }</style>
  <filter id="s" x="-10%" y="-10%" width="125%" height="125%">
    <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#0000001a"/>
  </filter>
  <marker id="a" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#94a3b8"/>
  </marker>
  <marker id="ag" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#16a34a"/>
  </marker>
  <marker id="ar" viewBox="0 0 10 6" refX="9" refY="3" markerWidth="8" markerHeight="6" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#ef4444"/>
  </marker>
</defs>

<!-- Background -->
<rect width="680" height="920" fill="#ffffff"/>
<rect x="1" y="1" width="678" height="918" rx="6" fill="none" stroke="#e2e8f0" stroke-width="2"/>

<!-- ── Judul ── -->
<text x="340" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#1e293b">Flowchart Sistem Television Ads</text>
<line x1="60" y1="46" x2="620" y2="46" stroke="#e2e8f0" stroke-width="1.5"/>

<!-- ── Keterangan aktor (kiri) ── -->
<rect x="18" y="58" width="12" height="12" rx="2" fill="#3b82f6"/>
<text x="35" y="68" font-size="10" fill="#64748b">Admin</text>
<rect x="100" y="58" width="12" height="12" rx="2" fill="#f59e0b"/>
<text x="117" y="68" font-size="10" fill="#64748b">TV Display</text>
<rect x="200" y="58" width="12" height="12" rx="2" fill="#16a34a"/>
<text x="217" y="68" font-size="10" fill="#64748b">Keputusan</text>


<!-- ══════════════════════════════════════════
     1. MULAI
     y = 100
     ══════════════════════════════════════════ -->
<rect x="240" y="82" width="200" height="38" rx="19" fill="#1d4ed8" filter="url(#s)"/>
<text x="340" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">MULAI</text>

<!-- arrow ↓ -->
<line x1="340" y1="120" x2="340" y2="147" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     2. Admin masuk ke sistem
     y = 175
     ══════════════════════════════════════════ -->
<rect x="190" y="148" width="300" height="54" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#s)"/>
<text x="340" y="169" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Admin Masuk ke Sistem</text>
<text x="340" y="187" text-anchor="middle" font-size="11" fill="#3b82f6">Masukkan username &amp; password</text>

<!-- arrow ↓ -->
<line x1="340" y1="202" x2="340" y2="229" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     3. KEPUTUSAN — Login berhasil?
     y = 258  (diamond center)
     ══════════════════════════════════════════ -->
<polygon points="340,229 460,258 340,287 220,258" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#s)"/>
<text x="340" y="254" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Login</text>
<text x="340" y="270" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Berhasil?</text>

<!-- "Tidak" branch → loop kiri -->
<path d="M220,258 L155,258 L155,175 L190,175" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#ar)"/>
<text x="172" y="215" text-anchor="middle" font-size="10" fill="#ef4444">Tidak,</text>
<text x="172" y="228" text-anchor="middle" font-size="10" fill="#ef4444">ulangi</text>

<!-- "Ya" label & arrow ↓ -->
<text x="355" y="305" font-size="11" fill="#16a34a" font-weight="600">Ya</text>
<line x1="340" y1="287" x2="340" y2="315" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     4. Admin kelola konten
     y = 343
     ══════════════════════════════════════════ -->
<rect x="190" y="316" width="300" height="54" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#s)"/>
<text x="340" y="337" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Admin Kelola Konten</text>
<text x="340" y="355" text-anchor="middle" font-size="11" fill="#3b82f6">Upload iklan, tambah channel, buat playlist</text>

<!-- arrow ↓ -->
<line x1="340" y1="370" x2="340" y2="397" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     5. Daftarkan TV & atur token
     y = 425
     ══════════════════════════════════════════ -->
<rect x="190" y="398" width="300" height="54" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#s)"/>
<text x="340" y="419" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Daftarkan Perangkat TV</text>
<text x="340" y="437" text-anchor="middle" font-size="11" fill="#3b82f6">Beri nama, lokasi &amp; token akses unik</text>

<!-- arrow ↓ -->
<line x1="340" y1="452" x2="340" y2="479" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     6. TV dinyalakan & terhubung
     y = 507
     ══════════════════════════════════════════ -->
<rect x="190" y="480" width="300" height="54" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="2" filter="url(#s)"/>
<text x="340" y="501" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">TV Dinyalakan &amp; Terhubung</text>
<text x="340" y="519" text-anchor="middle" font-size="11" fill="#b45309">Buka alamat layar menggunakan token</text>

<!-- arrow ↓ -->
<line x1="340" y1="534" x2="340" y2="561" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     7. Layar siaga tampil
     y = 589
     ══════════════════════════════════════════ -->
<rect x="190" y="562" width="300" height="54" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="2" filter="url(#s)"/>
<text x="340" y="583" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Layar Siaga Tampil di TV</text>
<text x="340" y="601" text-anchor="middle" font-size="11" fill="#b45309">Menampilkan jam, tanggal &amp; status</text>

<!-- arrow ↓ -->
<line x1="340" y1="616" x2="340" y2="643" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     8. Admin kirim perintah
     y = 671
     ══════════════════════════════════════════ -->
<rect x="190" y="644" width="300" height="54" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" filter="url(#s)"/>
<text x="340" y="665" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">Admin Pilih TV &amp; Kirim Perintah</text>
<text x="340" y="683" text-anchor="middle" font-size="11" fill="#3b82f6">Pilih konten yang akan ditampilkan</text>

<!-- arrow ↓ -->
<line x1="340" y1="698" x2="340" y2="725" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>


<!-- ══════════════════════════════════════════
     9. KEPUTUSAN — Jenis konten?
     y = 753  (diamond center)
     ══════════════════════════════════════════ -->
<polygon points="340,725 460,753 340,781 220,753" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#s)"/>
<text x="340" y="749" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Jenis</text>
<text x="340" y="765" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">Konten?</text>


<!-- ══════════════════════════════════════════
     10. Tiga cabang konten
     ══════════════════════════════════════════ -->

<!-- Branch kiri: Channel TV -->
<path d="M220,753 L130,753 L130,812" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
<text x="100" y="782" text-anchor="middle" font-size="10" fill="#64748b">Channel</text>
<rect x="52" y="813" width="156" height="48" rx="9" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.8" filter="url(#s)"/>
<text x="130" y="833" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">Putar Channel TV</text>
<text x="130" y="851" text-anchor="middle" font-size="10" fill="#3b82f6">Streaming IPTV</text>

<!-- Branch tengah: Iklan -->
<line x1="340" y1="781" x2="340" y2="812" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
<text x="355" y="800" font-size="10" fill="#64748b">Iklan</text>
<rect x="262" y="813" width="156" height="48" rx="9" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.8" filter="url(#s)"/>
<text x="340" y="833" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Putar Iklan</text>
<text x="340" y="851" text-anchor="middle" font-size="10" fill="#b45309">Slide &amp; video otomatis</text>

<!-- Branch kanan: Siaga -->
<path d="M460,753 L550,753 L550,812" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
<text x="519" y="782" text-anchor="middle" font-size="10" fill="#64748b">Siaga</text>
<rect x="472" y="813" width="156" height="48" rx="9" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.8" filter="url(#s)"/>
<text x="550" y="833" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Kembali Siaga</text>
<text x="550" y="851" text-anchor="middle" font-size="10" fill="#64748b">Layar jam &amp; tanggal</text>


<!-- ══════════════════════════════════════════
     11. Konten ditampilkan — gabung
     y = 893
     ══════════════════════════════════════════ -->

<!-- Gabung 3 cabang ke bawah -->
<path d="M130,861 L130,893 L262,893" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
<line x1="340" y1="861" x2="340" y2="893" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
<path d="M550,861 L550,893 L418,893" stroke="#94a3b8" stroke-width="1.5" fill="none"/>

<!-- SELESAI -->
<rect x="240" y="880" width="200" height="38" rx="19" fill="#1d4ed8" filter="url(#s)"/>
<text x="340" y="904" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">SELESAI</text>

<!-- Loop: kembali menunggu perintah admin -->
<path d="M524,899 L608,899 L608,671 L490,671" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
<text x="638" y="792" font-size="10" fill="#94a3b8" transform="rotate(90,638,792)">perintah baru</text>

</svg>
