<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Display Kiosk</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #080c14;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 60% at 20% 50%, rgba(37, 99, 235, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 60% 60% at 80% 50%, rgba(124, 58, 237, 0.14) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 50% 10%, rgba(16, 185, 129, 0.08) 0%, transparent 60%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 860px;
            padding: 0 48px;
            text-align: center;
        }

        .icon-wrap {
            width: 96px;
            height: 96px;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 40px;
            box-shadow: 0 0 60px rgba(37, 99, 235, 0.35);
        }

        .icon-wrap svg {
            width: 52px;
            height: 52px;
            fill: none;
            stroke: #fff;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 22px;
            color: #475569;
            margin-bottom: 64px;
            letter-spacing: 0.3px;
        }

        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-label {
            display: block;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #64748b;
            margin-bottom: 12px;
        }

        input[type="text"] {
            width: 100%;
            padding: 26px 32px;
            font-size: 22px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            color: #f1f5f9;
            outline: none;
            transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
        }

        input[type="text"]:focus {
            border-color: #2563eb;
            background: rgba(37, 99, 235, 0.06);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
        }

        input[type="text"]::placeholder {
            color: #334155;
            font-family: 'Segoe UI', system-ui, sans-serif;
            letter-spacing: normal;
        }

        .btn {
            width: 100%;
            padding: 26px 32px;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border: none;
            border-radius: 18px;
            color: #fff;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 8px 32px rgba(37, 99, 235, 0.3);
        }

        .btn:hover {
            opacity: 0.92;
            box-shadow: 0 12px 40px rgba(37, 99, 235, 0.4);
        }

        .btn:active {
            transform: scale(0.985);
        }

        .btn svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .hint {
            margin-top: 28px;
            color: #334155;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .hint kbd {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 14px;
            font-family: inherit;
        }

        .last-url {
            margin-top: 48px;
            padding: 20px 28px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            display: none;
            text-align: left;
        }

        .last-url.visible { display: block; }

        .last-url-label {
            font-size: 12px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #475569;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .last-url-value {
            font-size: 16px;
            color: #64748b;
            font-family: 'Courier New', monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-wrap">
            <!-- TV icon -->
            <svg viewBox="0 0 24 24">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <polyline points="8 21 12 17 16 21"/>
            </svg>
        </div>

        <h1>TV Display Kiosk</h1>
        <p class="subtitle">
            <span class="status-dot"></span>
            Masukkan URL display IPTV untuk ditampilkan
        </p>

        <form id="kiosk-form">
            <div class="form-group">
                <label class="input-label" for="url-input">Alamat URL</label>
                <input
                    type="text"
                    id="url-input"
                    placeholder="http://192.168.1.100:8000/display?token=..."
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    autofocus
                />
            </div>
            <button type="submit" class="btn">
                <svg viewBox="0 0 24 24">
                    <polyline points="5 12 12 5 19 12"/>
                    <line x1="12" y1="5" x2="12" y2="19"/>
                </svg>
                Buka Display
            </button>
        </form>

        <p class="hint">
            Tekan <kbd>Enter</kbd> untuk melanjutkan
        </p>

        <div class="last-url" id="last-url-box">
            <div class="last-url-label">URL terakhir digunakan</div>
            <div class="last-url-value" id="last-url-text"></div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'kiosk_last_url';
        const input = document.getElementById('url-input');
        const lastBox = document.getElementById('last-url-box');
        const lastText = document.getElementById('last-url-text');

        const savedUrl = localStorage.getItem(STORAGE_KEY);
        if (savedUrl) {
            input.value = savedUrl;
            lastText.textContent = savedUrl;
            lastBox.classList.add('visible');
        }

        input.focus();
        input.select();

        document.getElementById('kiosk-form').addEventListener('submit', function (e) {
            e.preventDefault();
            let url = input.value.trim();
            if (!url) return;

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'http://' + url;
            }

            localStorage.setItem(STORAGE_KEY, url);
            window.location.href = url;
        });
    </script>
</body>
</html>
