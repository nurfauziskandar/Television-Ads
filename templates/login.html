<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TV Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
    <style>
        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
            padding: 24px;
        }
        .auth-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .auth-logo i {
            font-size: 28px;
            color: var(--accent);
        }
        .auth-logo span {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .auth-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .auth-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .auth-error {
            background: var(--danger-subtle);
            border: 1px solid rgba(245, 101, 101, 0.3);
            border-radius: var(--radius);
            padding: 12px 14px;
            font-size: 13px;
            color: var(--danger);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-form .form-group { margin-bottom: 18px; }
        .auth-form .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .auth-form .form-control {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: border-color var(--transition);
        }
        .auth-form .form-control:focus {
            outline: none;
            border-color: var(--accent);
        }
        .auth-submit {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background var(--transition);
            margin-top: 8px;
        }
        .auth-submit:hover { background: var(--accent-hover); }
    </style>
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fa-solid fa-tower-broadcast"></i>
            <span>TV Control</span>
        </div>
        <div class="auth-title">Masuk ke Admin Panel</div>
        <div class="auth-subtitle">Masukkan kredensial admin untuk melanjutkan.</div>

        {% if error %}
        <div class="auth-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="auth-form" autocomplete="off">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Username admin" autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Password" autocomplete="current-password">
            </div>
            <button type="submit" class="auth-submit">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Masuk
            </button>
        </form>
    </div>
</div>
</body>
</html>
